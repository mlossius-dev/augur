    notes: OFAC sanctions designations. Very high source weight — official US Treasury.

  - source_id: searxng_regulatory
    canonical_name: SearXNG — Regulatory
    url_base: ${SEARXNG_URL}
    tier: 3
    perspective: us_eu
    languages: [en]
    access_method: searxng
    access_config:
      queries:
        - query: "sanctions imposed export controls trade restrictions regulation"
          category: news
        - query: "court ruling regulatory enforcement antitrust central bank policy"
          category: news
      max_results_per_query: 10
    update_cadence: hourly
    domains: [regulatory, geopolitical]
    starting_source_weight: 0.50
    enabled: true
    notes: SearXNG queries for regulatory and sanctions signals.
