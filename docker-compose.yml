services:

  # ── Postgres 16 with all Augur extensions ────────────────────────────────────
  db:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-augur}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-augur}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Expose to localhost for direct inspection; remove in production
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-augur} -d ${POSTGRES_DB:-augur}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis — reserved for future Dramatiq task queue migration ────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Augur application ────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-augur}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-augur}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OPENROUTER_API_KEY must be set}
      OPENROUTER_FREE_TIER_API_KEY: ${OPENROUTER_FREE_TIER_API_KEY:?OPENROUTER_FREE_TIER_API_KEY must be set}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:?LANGFUSE_PUBLIC_KEY must be set}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:?LANGFUSE_SECRET_KEY must be set}
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-augur-backups}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-eu-central}
      DAILY_LLM_BUDGET_USD: ${DAILY_LLM_BUDGET_USD:-5.00}
      AUGUR_ENV: ${AUGUR_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - payloads:/app/payloads
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  payloads:
